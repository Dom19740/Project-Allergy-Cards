<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Create and share personalized allergy alert cards in multiple languages. Quick, easy and travel-friendly." />
    <meta name="theme-color" content="#ffffff" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="color-scheme" content="light dark" />
    <title>Simple Allergy Alert</title>

    <!-- Favicons / App icons (served from public/) -->
    <link rel="icon" href="/favicon.ico" />
    <!-- SVG icon for modern browsers -->
    <link rel="icon" type="image/svg+xml" href="/placeholder.svg" />
    <!-- Apple touch icon (used when adding to home screen on iOS) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/logo_main.png" />
    <!-- Fallback PNG icon (some platforms expect PNG) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico" />
    <!-- Optional mask icon for Safari pinned tabs (uses placeholder.svg) -->
    <link rel="mask-icon" href="/placeholder.svg" color="#5bbad5" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
