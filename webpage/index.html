<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Allergy Alert — Travel Safely with Food Allergies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="/favicon.ico" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .brand-red {
            background-color: #dc2626;
        }
        .text-brand-red {
            color: #dc2626;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="w-full py-3 px-4 flex justify-center items-center bg-white border-b border-gray-100 shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="brand-red text-white px-4 py-2 rounded-lg text-xl font-black tracking-tight">
                SIMPLE ALLERGY ALERT
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <main class="flex-grow flex flex-col items-center justify-center px-4 py-6 text-center max-w-4xl mx-auto">
        <div class="mb-4">
            <img src="images/logo_main.png" alt="Simple Allergy Alert Logo" class="max-w-[200px] md:max-w-[280px] h-auto mx-auto">
        </div>

        <h1 class="text-2xl md:text-4xl font-black text-gray-900 mb-3 tracking-tight">
            Travel Safely. <span class="text-brand-red">Eat with Confidence.</span>
        </h1>
        
        <p class="text-base md:text-lg text-gray-600 mb-4 max-w-xl leading-relaxed">
            Create personalized allergy alert cards in over 100 languages.
        </p>

    </main>

    <!-- Features Grid -->
    <section class="bg-white py-6 px-4 border-t border-gray-100">
        <div class="max-w-4xl mx-auto grid grid-cols-3 gap-4">
            <div class="text-center">
                <div class="brand-red/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-brand-red" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" />
                    </svg>
                </div>
                <h3 class="text-sm font-bold mb-1">100+ Languages</h3>
                <p class="text-xs text-gray-500">Instant translations</p>
            </div>
            <div class="text-center">
                <div class="brand-red/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-brand-red" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    </svg>
                </div>
                <h3 class="text-sm font-bold mb-1">Offline</h3>
                <p class="text-xs text-gray-500">Use without data</p>
            </div>
            <div class="text-center">
                <div class="brand-red/10 w-10 h-10 rounded-xl flex items-center justify-center mx-auto mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-brand-red" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <h3 class="text-sm font-bold mb-1">Emergency</h3>
                <p class="text-xs text-gray-500">Local numbers</p>
            </div>
        </div>

        <div class="mt-4 flex flex-col sm:flex-row gap-2 w-full max-w-sm mx-auto">
            <div class="flex-1 bg-gray-900 text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center justify-center opacity-50 cursor-not-allowed">
                <span>App Store</span>
            </div>
            <div class="flex-1 bg-gray-900 text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center justify-center opacity-50 cursor-not-allowed">
                <span>Play Store</span>
            </div>
        </div>
        
    </section>

    <!-- Footer -->
    <footer class="w-full py-4 px-4 bg-gray-50 text-center border-t border-gray-100">
        <div class="max-w-4xl mx-auto">
            <p class="text-xs text-gray-500 mb-2">© 2026 dpb creative.</p>
            <div class="flex justify-center space-x-4 text-xs font-bold text-gray-400 uppercase tracking-widest">
                <a href="../privacy-policy.html" class="hover:text-brand-red transition-colors">Privacy</a>
                <a href="mailto:info@simpleallergyalert.com" class="hover:text-brand-red transition-colors">Contact</a>
            </div>
        </div>
    </footer>

</body>
</html>
